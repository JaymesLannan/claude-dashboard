services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: claude_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/claude_dashboard
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ANTHROPIC_ADMIN_KEY: ${ANTHROPIC_ADMIN_KEY}
    depends_on:
      db:
        condition: service_healthy

  migrate:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "apk add --no-cache openssl && node_modules/.bin/prisma db push --accept-data-loss"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/claude_dashboard
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "apk add --no-cache openssl && node /app/prisma/seed.js"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/claude_dashboard
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: "no"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/claude_dashboard
      ANTHROPIC_ADMIN_KEY: ${ANTHROPIC_ADMIN_KEY:-disabled}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
